name: Update papers daily

on:
  workflow_dispatch:
    inputs:
      year_low:
        description: 'Minimum publication year (inclusive)'
        required: false
        default: ''
        type: string
      year_high:
        description: 'Maximum publication year (inclusive)'
        required: false
        default: ''
        type: string
      total_limit:
        description: 'Maximum total number of arXiv results'
        required: false
        default: ''
        type: string

  schedule:
    - cron: '17 9 * * *'
      timezone: 'Asia/Shanghai'

permissions:
  contents: write

concurrency:
  group: update-papers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/embedded-ai/package-lock.json

      - name: Install Node.js dependencies
        working-directory: scripts/embedded-ai
        run: npm ci

      - name: Run paper updater
        working-directory: scripts/embedded-ai
        env:
          TENCENT_TOKENHUB_API_KEY: ${{ secrets.TENCENT_TOKENHUB_API_KEY }}
          TENCENT_TOKENHUB_MODEL: ${{ vars.TENCENT_TOKENHUB_MODEL || 'hunyuan-2.0-instruct-20251111' }}
          YEAR_LOW: ${{ github.event.inputs.year_low || '' }}
          YEAR_HIGH: ${{ github.event.inputs.year_high || '' }}
          TOTAL_LIMIT: ${{ github.event.inputs.total_limit || '' }}
        run: |
          ARGS=(
            "--source" "arxiv"
            "--skip-download"
          )

          if [ -n "$YEAR_LOW" ]; then
            ARGS+=("--year-low" "$YEAR_LOW")
          fi

          if [ -n "$YEAR_HIGH" ]; then
            ARGS+=("--year-high" "$YEAR_HIGH")
          fi

          if [ -n "$TOTAL_LIMIT" ]; then
            ARGS+=("--total-limit" "$TOTAL_LIMIT")
          fi

          if [ -z "$TENCENT_TOKENHUB_API_KEY" ]; then
            echo "TENCENT_TOKENHUB_API_KEY not set, fallback to heuristic-only mode"
            ARGS+=("--heuristic-only")
          fi

          echo "Running: node update-papers.mjs ${ARGS[*]}"
          node update-papers.mjs "${ARGS[@]}"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _data/embedded_ai_papers.json
          git add artifacts/*.bib
          git add google_scholar_crawler/cache/normalized_papers.json
          git add google_scholar_crawler/state/classification_checkpoint.json
          git add google_scholar_crawler/state/download_state.json
          git add google_scholar_crawler/state/download_quota.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto update embedded AI papers"
          git push