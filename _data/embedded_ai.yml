name: Update Embedded AI papers

run-name: >-
  Update Embedded AI papers
  (${{ github.event_name == 'workflow_dispatch' && inputs.groups || 'A,B,C' }})
  by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      groups:
        description: '要处理的分组，逗号分隔：A,B,C'
        required: false
        default: 'A,B,C'
        type: string
      max_results:
        description: '每组最大抓取数'
        required: false
        default: '120'
        type: string
      skip_search:
        description: '复用已有 Scholar 缓存，不重新搜索'
        required: false
        default: false
        type: boolean
      skip_download:
        description: '跳过 PDF 下载'
        required: false
        default: true
        type: boolean
      heuristic_only:
        description: '只使用启发式分类'
        required: false
        default: false
        type: boolean
      clear_cache:
        description: '运行前清空缓存'
        required: false
        default: false
        type: boolean
      proxy_mode:
        description: 'Scholar 代理模式'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - free
          - single
      http_proxy:
        description: '当 proxy_mode=single 时使用的 HTTP 代理'
        required: false
        default: ''
        type: string
      https_proxy:
        description: '当 proxy_mode=single 时使用的 HTTPS 代理'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '15 9 * * *'
      timezone: 'Asia/Shanghai'

permissions:
  contents: write

concurrency:
  group: embedded-ai-paper-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/embedded-ai/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: google_scholar_crawler/requirements.txt

      - name: Install Node dependencies
        working-directory: scripts/embedded-ai
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Python dependencies
        if: ${{ hashFiles('google_scholar_crawler/requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r google_scholar_crawler/requirements.txt

      - name: Preflight check for crawler CLI
        run: |
          if [ ! -f google_scholar_crawler/main.py ]; then
            echo "::error::google_scholar_crawler/main.py 不存在，无法执行 Scholar 抓取。"
            exit 1
          fi

          if ! grep -q "keyword-search\|download" google_scholar_crawler/main.py; then
            echo "::warning::当前 main.py 看起来不像新版 CLI crawler。请确认它支持 keyword-search / download 子命令。"
          fi

      - name: Run paper updater
        env:
          TENCENT_TOKENHUB_API_KEY: ${{ secrets.TENCENT_TOKENHUB_API_KEY }}
          TENCENT_TOKENHUB_MODEL: ${{ vars.TENCENT_TOKENHUB_MODEL || 'hunyuan-2.0-instruct-20251111' }}
        run: |
          ARGS=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARGS+=("--groups" "${{ inputs.groups }}")
            ARGS+=("--max-results" "${{ inputs.max_results }}")
            ARGS+=("--proxy-mode" "${{ inputs.proxy_mode }}")

            if [ "${{ inputs.skip_search }}" = "true" ]; then
              ARGS+=("--skip-search")
            fi

            if [ "${{ inputs.skip_download }}" = "true" ]; then
              ARGS+=("--skip-download")
            fi

            if [ "${{ inputs.clear_cache }}" = "true" ]; then
              ARGS+=("--clear-cache")
            fi

            if [ "${{ inputs.heuristic_only }}" = "true" ]; then
              ARGS+=("--heuristic-only")
            fi

            if [ "${{ inputs.proxy_mode }}" = "single" ]; then
              if [ -n "${{ inputs.http_proxy }}" ]; then
                ARGS+=("--http-proxy" "${{ inputs.http_proxy }}")
              fi
              if [ -n "${{ inputs.https_proxy }}" ]; then
                ARGS+=("--https-proxy" "${{ inputs.https_proxy }}")
              fi
            fi
          else
            ARGS+=("--groups" "A,B,C")
            ARGS+=("--max-results" "120")
            ARGS+=("--skip-download")
          fi

          if [ -z "${TENCENT_TOKENHUB_API_KEY}" ]; then
            echo "TENCENT_TOKENHUB_API_KEY 未配置，自动切换到 --heuristic-only"
            ARGS+=("--heuristic-only")
          fi

          printf 'Running args: %q ' node scripts/embedded-ai/update-papers.mjs "${ARGS[@]}"
          echo
          node scripts/embedded-ai/update-papers.mjs "${ARGS[@]}"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            _data/embedded_ai_papers.json \
            artifacts \
            google_scholar_crawler/cache \
            google_scholar_crawler/state

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto update embedded AI papers"
          git push
